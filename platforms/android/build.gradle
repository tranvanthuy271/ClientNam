apply plugin: 'com.android.application'

android {
    namespace 'com.beatdz.langlalau'
    compileSdk 36

    defaultConfig {
        applicationId 'com.beatdz.langlalau'
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            java.srcDirs = ['src/main/java']
            res.srcDirs = ['res']
            assets.srcDirs = ["$buildDir/generated/minimalAssets"]
            jniLibs.srcDirs = ['libs']
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    packagingOptions {
        resources {
            excludes += [
                'META-INF/robovm/ios/robovm.xml',
                'META-INF/DEPENDENCIES',
                'META-INF/DEPENDENCIES.txt',
                '**/*.gwt.xml'
            ]
            pickFirsts += ['META-INF/LICENSE', 'META-INF/LICENSE.txt', 'META-INF/NOTICE', 'META-INF/NOTICE.txt']
        }
    }
}

configurations {
    natives
}

tasks.register('syncMinimalAndroidAssets', Sync) {
    from('../../srcClientdetu/Langla_data') {
        include 'resource/**'
    }
    into "$buildDir/generated/minimalAssets"
}

tasks.named('preBuild') {
    dependsOn 'syncMinimalAndroidAssets'
}

dependencies {
    implementation project(':core')
    implementation "com.badlogicgames.gdx:gdx-backend-android:$gdxVersion"

    natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-armeabi-v7a"
    natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-arm64-v8a"
    natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-x86"
    natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-x86_64"
    natives "com.badlogicgames.gdx:gdx-freetype-platform:$gdxVersion:natives-armeabi-v7a"
    natives "com.badlogicgames.gdx:gdx-freetype-platform:$gdxVersion:natives-arm64-v8a"
    natives "com.badlogicgames.gdx:gdx-freetype-platform:$gdxVersion:natives-x86"
    natives "com.badlogicgames.gdx:gdx-freetype-platform:$gdxVersion:natives-x86_64"
}

tasks.register('copyAndroidNatives') {
    doFirst {
        ['armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'].each {
            file("libs/$it").mkdirs()
        }
        configurations.natives.files.each { nativeJar ->
            def abi = ['armeabi-v7a', 'arm64-v8a', 'x86_64', 'x86'].find { abiName ->
                nativeJar.name.endsWith("natives-${abiName}.jar")
            }
            if (abi != null) {
                copy {
                    from zipTree(nativeJar)
                    into file("libs/$abi")
                    include '*.so'
                }
            }
        }
    }
}

tasks.matching { it.name.contains('merge') && it.name.contains('JniLibFolders') }.configureEach {
    dependsOn 'copyAndroidNatives'
}
